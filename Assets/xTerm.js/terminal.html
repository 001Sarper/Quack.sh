<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: #1e1e2e; }
        #terminal { height: 100%; }
    </style>
</head>
<body>
<div id="terminal"></div>
<script>
    var term = new Terminal({
        convertEol: true,
        fontSize: 14,
        fontFamily: 'JetBrains Mono, Cascadia Code, monospace',
        cursorBlink: true,
        cursorStyle: 'block',
        scrollback: 1000,
        theme: {
            background: '#1e1e2e',
            foreground: '#cdd6f4',
            cursor: '#f5e0dc',
            selection: '#45475a',
            black: '#45475a',
            red: '#f38ba8',
            green: '#a6e3a1',
            yellow: '#f9e2af',
            blue: '#89b4fa',
            magenta: '#f5c2e7',
            cyan: '#94e2d5',
            white: '#bac2de',
        }
    });

    var fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));
    term.focus();

    let isResizing = false;

    function safeFit() {
        isResizing = true;
        fitAddon.fit();
        setTimeout(() => isResizing = false, 0);
    }

    setTimeout(function() {
        safeFit();
        terminalBridge.setSize(term.cols, term.rows);
        terminalBridge.connect();
    }, 500);

    let resizeTimeout;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(function() {
            safeFit();
            terminalBridge.setSize(term.cols, term.rows);
        }, 200);
    });

    term.onData(function(data) {
        if (isResizing) return;
        try {
            terminalBridge.sendInput(data);
        } catch(e) {
            term.write('\r\nJS Error: ' + e.message + '\r\n');
        }
    });

    term.attachCustomWheelEventHandler(function(e) {
        if (e.ctrlKey) {
            e.preventDefault();
            return false;
        }
        return true;
    });

    term.attachCustomKeyEventHandler(function(event) {
        if (event.ctrlKey && event.type === 'keydown' && event.key === 'Control') {
            return false;
        }
        return true;
    });

    function setTheme(isDark) {
        if (isDark) {
            term.options.theme = {
                background: '#1e1e2e',
                foreground: '#cdd6f4',
                cursor: '#f5e0dc',
                selection: '#45475a',
                black: '#45475a',
                red: '#f38ba8',
                green: '#a6e3a1',
                yellow: '#f9e2af',
                blue: '#89b4fa',
                magenta: '#f5c2e7',
                cyan: '#94e2d5',
                white: '#bac2de',
            };
            document.body.style.background = '#1e1e2e';
        } else {
            term.options.theme = {
                background: '#eff1f5',
                foreground: '#4c4f69',
                cursor: '#dc8a78',
                selection: '#acb0be',
                black: '#5c5f77',
                red: '#d20f39',
                green: '#40a02b',
                yellow: '#df8e1d',
                blue: '#1e66f5',
                magenta: '#ea76cb',
                cyan: '#179299',
                white: '#acb0be',
            };
            document.body.style.background = '#eff1f5';
        }
    }

    function getSize() {
        safeFit();
        return term.cols + "," + term.rows;
    }
</script>
</body>
</html>
